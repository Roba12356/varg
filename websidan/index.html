<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Vargar</title>
</head>
<body style="font-family: Arial; background-color: #f0f0f0;">

    <h1 style="color: darkgreen;">Vargen</h1>

    <img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Canis_lupus_laying.jpg" 
         alt="En varg" 
         style="width:300px; border: 2px solid black;">

    <p style="font-size: 16px;">
        Vargen är ett rovdjur som lever i skogar och kalla områden. 
        Den tillhör hundfamiljen och är släkt med hundar.
    </p>

    <p style="font-size: 16px;">
        Vargar lever i flock och jagar tillsammans. 
        De äter till exempel älg och rådjur.
    </p>

</body>
